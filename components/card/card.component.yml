$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Image card
group: Card
props:
  type: object
  required:
    - heading_text
    - orientation
    - style
  properties:
    background:
      type: string
      title: Background
      enum:
        - default
        - accent
        - primary
        - muted
        - bright
        - light
        - inverted
      meta:enum:
        default: Default
        accent: Accent
        primary: Primary
        muted: Muted
        bright: Bright
        light: Light
        inverted: Inverted
      default: default
      examples:
        - default
    style:
      type: string
      title: Style
      enum:
        - framed
        - full
      meta:enum:
        framed: Framed
        full: Full width
      default: framed
      examples:
        - framed
    orientation:
      type: string
      title: Orientation
      enum:
        - vertical
        - horizontal
      meta:enum:
        vertical: Vertical
        horizontal: Horizontal
      default: vertical
      examples:
        - vertical
    heading_text:
      type: string
      title: Heading
      examples:
        - "This is your card title"
    level:
      type: number
      title: Heading level
      enum:
        - 2
        - 3
        - 4
      default: 3
      examples:
        - 3
    url:
      type:
        - string
        - "null"
      title: Link
      default: null
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type:
        - object
        - "null"
      default: null
      examples:
        - null
        - src: "assets/gradient.png"
          width: 1200
          height: 900
          alt: "Gradient"
    date:
      type:
        - string
        - "null"
      title: Date
      default: null
      examples:
        - "February 27, 2026"
    start_date:
      type:
        - string
        - "null"
      title: Start date
      default: null
      examples:
        - "February 27, 2026"
    end_date:
      type:
        - string
        - "null"
      title: End date
      default: null
      examples:
        - "February 28, 2026"
    start_time:
      type:
        - string
        - "null"
      title: Start time
      default: null
      examples:
        - "2:00 PM"
    end_time:
      type:
        - string
        - "null"
      title: End time
      default: null
      examples:
        - "4:00 PM"
    text:
      type:
        - string
        - "null"
      title: Description
      default: null
      pattern: "(.|\\r?\\n)*"
      examples:
        - "Quaerat laborum rerum dolores dolores dolor qui."
    is_text_centered:
      type: boolean
      title: Center text
      default: false
      examples:
        - false
examples:
  default:
    props:
      heading_text: "Example card title"
      orientation: vertical
      style: framed
      background: default
      level: 3
      url: null
      media: null
      date: null
      start_date: "February 27, 2026"
      end_date: "February 28, 2026"
      start_time: "2:00 PM"
      end_time: "4:00 PM"
      text: "This is an example card description."
      is_text_centered: false
