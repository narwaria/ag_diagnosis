$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json

name: Hero side-by-side
description: Hero with side-by-side slots for media and content.
group: Hero

props:
  type: object
  required:
    - padding_block_start
    - padding_block_end

  properties:

    hero_flex_gap:
      type: string
      title: Flex gap
      enum:
        - large
        - extra-large
      meta:enum:
        large: Normal
        extra-large: Extra-Large
      default: large
      examples:
        - large

    hero_flex_direction_mobile:
      type: string
      title: Mobile flex direction
      enum:
        - vertical
        - vertical-reverse
      meta:enum:
        vertical: Vertical
        vertical-reverse: Reverse vertical
      default: vertical
      examples:
        - vertical

    background:
      type: string
      title: Background color
      enum:
        - default
        - primary
        - secondary
        - accent
        - muted
        - bright
        - light
      meta:enum:
        default: Default
        primary: Primary
        secondary: Secondary
        accent: Accent
        muted: Muted
        bright: Bright
        light: Light

    padding_block_start:
      type: string
      title: Padding top
      enum:
        - "0"
        - "16"
        - "32"
        - "64"
      examples:
        - "0"

    padding_block_end:
      type: string
      title: Padding bottom
      enum:
        - "0"
        - "16"
        - "32"
        - "64"
      examples:
        - "0"

    margin_block_start:
      type: string
      title: Margin top
      enum:
        - "0"
        - "8"
        - "20"
        - "32"
        - "48"
        - "64"
        - "96"
        - "128"
      examples:
        - "0"

    margin_block_end:
      type: string
      title: Margin bottom
      enum:
        - "0"
        - "8"
        - "20"
        - "32"
        - "48"
        - "64"
        - "96"
        - "128"
      examples:
        - "0"

    image_size:
      type: string
      title: Aspect ratio
      enum:
        - "2:1"
        - "16:9"
        - "3:2"
        - "4:3"
        - "1:1"
      meta:enum:
        "2:1": 2 × 1
        "16:9": 16 × 9
        "3:2": 3 × 2
        "4:3": 4 × 3
        "1:1": Square
      default: "4:3"
      examples:
        - "4:3"

    image_position:
      type: string
      title: Image position
      enum:
        - left
        - right
      meta:enum:
        left: Left
        right: Right
      default: left
      examples:
        - right

    image_radius:
      type: string
      title: Image border radius
      enum:
        - small
        - large
        - extra-large
      meta:enum:
        small: Small
        large: Large
        extra-large: Extra-Large
      default: small
      examples:
        - extra-large

    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type:
        - object
        - "null"
      examples:
        - null
        - src: assets/gradient-lg.png
          alt: Gradient
          width: 1920
          height: 1344

slots:
  hero_slot:
    title: Additional content
    description: Optional slot for additional components below the button

examples:
  default:
    props:
      hero_flex_gap: large
      hero_flex_direction_mobile: vertical
      background: default
      padding_block_start: "0"
      padding_block_end: "0"
      margin_block_start: "0"
      margin_block_end: "0"
      image_size: "4:3"
      image_position: left
      image_radius: small
      media: null

    slots:
      hero_slot: []
