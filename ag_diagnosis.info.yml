name: AG Diagnosis
type: theme
description: 'Custom sub-theme of the Diagnosis theme.'
package: Custom
core_version_requirement: ^10 || ^11
base theme: diagnosis

libraries:
  - ag_diagnosis/global

libraries-override:
  diagnosis/global:
    css:
      theme:
        src/fonts.css: false
        build/main.min.css: false
        src/theme.css: false

regions:
  header: Header
  primary_menu: Primary menu
  secondary_menu: Secondary menu
  highlighted: Highlighted
  breadcrumb: Breadcrumb
  content: Content
  sidebar_first: Sidebar first
  sidebar_second: Sidebar second
  footer: Footer
