global:
  css:
    base:
      css/base/reset.css: {}
      css/base/typography.css: {}

    layout:
      css/layout/grid.css: {}
      css/layout/header.css: {}
      css/layout/footer.css: {}

    component:
      css/components/buttons.css: {}
      css/components/forms.css: {}
      css/components/cards.css: {}

    theme:
      src/fonts.css:
        preprocess: false
      build/main.min.css:
        preprocess: false
        minified: true
      src/theme.css:
        preprocess: false
      css/theme/colors.css: {}
      css/theme/theme.css: {}

  js:
    components/navbar/navbar.js:
      attributes:
        type: module
    js/script.js: {}

  dependencies:
    - core/drupal
    - core/once

threejs:
  js:
    https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js:
      type: external
      minified: true
  dependencies:
    - core/drupal
    - core/once
